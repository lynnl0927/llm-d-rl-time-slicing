apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acceleratororchestrator.fullname" . }}
  labels:
    {{- include "acceleratororchestrator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "acceleratororchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "acceleratororchestrator.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
